[tool.ruff]
exclude = ["*/SOURCE/assembly/"]
line-length = 180
target-version = "py310"

[tool.ruff.lint]
exclude = ["tmp*/"]
extend-select = ["I"]
ignore = ["E731"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]

[tool.ty.analysis]
replace-imports-with-any = ["triton", "triton.**"]

[tool.ty.environment]
extra-paths = ["typings"]
python-version = "3.10"
